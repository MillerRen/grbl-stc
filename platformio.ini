; PlatformIO Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = stc8h8k64u
src_dir = .
include_dir = .

[env:stc8h8k64u]
platform = intel_mcs51
board = stc8h8k64u

; Set frequency to 24MHz as per README.md
board_build.f_cpu = 24000000L

build_flags = 
    -Igrbl
    -Ilib
    --model-large
    --opt-code-size
    --std-sdcc11
    ; Keil C51 keyword compatibility macros (from .vscode/c_cpp_properties.json)
    -Ddata=__data
    -Dxdata=__xdata
    -Didata=__idata
    -Dpdata=__pdata
    -Dbdata=__bdata
    -Dcode=__code
    -Dbit=bool
    -Dsbit=bool
    -Dsfr=unsigned char
    -Dinterrupt=__interrupt
    -Dusing=__using
    -Dreentrant=__reentrant

; Filter source files to match the Keil project structure
src_filter = 
    +<grbl/*.c>
    +<lib/*.c>

; Custom upload protocol using stcgal
; You may need to change the port (e.g. COM3 or /dev/ttyUSB0)
upload_protocol = custom
upload_command = stcgal -P stc8h -p $UPLOAD_PORT $SOURCE
